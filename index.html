<head>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jeekeagle.github.io/wuji-books">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23faf7f0'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='52' font-family='serif' fill='%231a1a1a'%3E书%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <!-- 无记 · Books v1.0.0 -->
</head>
<body>

    <header class="site-header">
        <h1 class="logo"><a href="https://jeekeagle.github.io/wuji/">无 记</a></h1>
        <nav class="primary-nav" aria-label="主导航">
            <ul>
                <li><a href="https://jeekeagle.github.io/wuji/" target="_self">home</a></li>
                <li><a href="https://jeekeagle.github.io/wuji-blog/" target="_blank" rel="noopener">Post</a></li>
                <li><a href="https://jeekeagle.github.io/zero-perspective-hub/" target="_blank" rel="noopener">Perspective</a></li>
                <li><a href="https://jeekeagle.github.io/wuji-deep-hub/" target="_blank" rel="noopener">Deep</a></li>
                <li><a href="https://jeekeagle.github.io/wuji-flow/" target="_blank" rel="noopener">Flow</a></li>
                <li class="active"><a href="./" aria-current="page">Books</a></li>
                            </ul>
        </nav>
    </header>

    <main class="page-content">
        <h2 class="page-title">书</h2>
        <p class="page-sub">读过的、写的、在写的。</p>

        <ul class="book-grid" id="bookGrid">
            <li class="book-card">
                <a class="book-link" href="https://jeekeagle.github.io/mg-16-code/" target="_blank" rel="noopener">
                    <div class="book-cover"><img src="./covers/mg-16-code.png" alt="管理者的十六字心法"></div>
                    <div class="book-meta">
                        <p class="book-title">管理者的十六字心法</p>
                    </div>
                </a>
            </li>
        </ul>
    </main>

    <script>
        // Empty-state fallback. Only renders when bookGrid has zero <li> children at load.
        // If you add books below, this stays dormant; if you remove all, it shows "还没有书。"
        (function () {
            var grid = document.getElementById('bookGrid');
            if (!grid || grid.children.length > 0) return;
            var empty = document.createElement('li');
            empty.className = 'book-empty';
            empty.textContent = '还没有书。';
            grid.appendChild(empty);
        })();
    </script>
</body>
</html>
